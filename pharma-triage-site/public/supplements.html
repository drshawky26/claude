<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="الصفحة غير موجودة في Pharma Triage.">
<meta name="theme-color" content="#0d1f3c">
<meta name="robots" content="noindex">
<title>404 - الصفحة غير موجودة</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&family=Noto+Kufi+Arabic:wght@400;700;900&display=swap" media="print" onload="this.media='all'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&family=Noto+Kufi+Arabic:wght@400;700;900&display=swap"></noscript>
<style>/* ═══════════════════════════════════════════════════════════════
   PHARMA TRIAGE — Design System v2
   Aesthetic: Medical Precision · Navy + Ivory + Teal accent
   Font: Noto Kufi Arabic (display) + Cairo (body)
═══════════════════════════════════════════════════════════════ */

/* ── TOKENS ──────────────────────────────────────────────────── */
:root {
  --navy:        #0d1f3c;
  --navy2:       #162d52;
  --navy3:       #1e3d6e;
  --teal:        #0ea5a0;
  --teal2:       #0cc8c2;
  --teal-glow:   rgba(14,165,160,.20);
  --teal-soft:   rgba(14,165,160,.08);
  --gold:        #c9a84c;
  --gold-soft:   rgba(201,168,76,.12);
  --ivory:       #f9f7f2;
  --white:       #ffffff;
  --ink:         #0d1f3c;
  --body-text:   #2d4060;
  --muted:       #6b82a0;
  --border:      rgba(13,31,60,.10);
  --border2:     rgba(13,31,60,.18);
  --green:       #0f8c5e;
  --green-soft:  rgba(15,140,94,.08);
  --red:         #c0392b;
  --red-soft:    rgba(192,57,43,.08);
  --amber:       #d97706;
  --amber-soft:  rgba(217,119,6,.10);

  --r-xs:  6px;
  --r-sm:  10px;
  --r:     16px;
  --r-lg:  22px;
  --r-xl:  28px;

  --sh-sm: 0 1px 4px rgba(13,31,60,.08), 0 0 0 1px rgba(13,31,60,.04);
  --sh:    0 4px 20px rgba(13,31,60,.10), 0 1px 4px rgba(13,31,60,.06);
  --sh-lg: 0 12px 40px rgba(13,31,60,.14), 0 4px 10px rgba(13,31,60,.07);
  --sh-xl: 0 24px 60px rgba(13,31,60,.18);

  --t: .2s cubic-bezier(.4,0,.2,1);

  --hdr: 66px;
}

/* ── RESET ───────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }

body {
  font-family: 'Cairo', Tahoma, sans-serif;
  font-size: 14px;
  color: var(--body-text);
  background: var(--ivory);
  min-height: 100vh;
  line-height: 1.6;
  /* Subtle grid background */
  background-image:
    radial-gradient(ellipse 70% 50% at 15% 0%, rgba(14,165,160,.06) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 90% 10%, rgba(13,31,60,.05) 0%, transparent 55%),
    linear-gradient(180deg, #f4f6fb 0%, #f9f7f2 100%);
}

/* ── TYPOGRAPHY ──────────────────────────────────────────────── */
h1,h2,h3,h4,h5 {
  font-family: 'Noto Kufi Arabic', 'Cairo', sans-serif;
  color: var(--navy);
  font-weight: 700;
  line-height: 1.3;
}

/* ── HEADER ──────────────────────────────────────────────────── */
header {
  height: var(--hdr);
  background: var(--navy);
  position: sticky;
  top: 0;
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 28px;
  box-shadow: 0 2px 24px rgba(13,31,60,.35);
}
/* Decorative teal line at bottom of header */
header::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--teal), var(--gold), var(--teal), transparent);
}
.hdr-brand {
  display: flex;
  align-items: center;
  gap: 12px;
}
.hdr-logo {
  width: 38px;
  height: 38px;
  background: linear-gradient(135deg, var(--teal), var(--teal2));
  border-radius: var(--r-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  box-shadow: 0 4px 14px var(--teal-glow);
  flex-shrink: 0;
}
.hdr-name {
  font-family: 'Noto Kufi Arabic', sans-serif;
  font-size: 18px;
  font-weight: 900;
  color: #fff;
  letter-spacing: .3px;
}
.hdr-sub {
  font-size: 11px;
  color: rgba(255,255,255,.5);
  margin-top: 1px;
}
.hdr-center {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
  pointer-events: none;
}
.hdr-center-title {
  font-family: 'Noto Kufi Arabic', sans-serif;
  font-size: 17px;
  font-weight: 700;
  color: #fff;
}
.hdr-center-sub {
  font-size: 11px;
  color: rgba(255,255,255,.45);
}
.hdr-actions {
  display: flex;
  align-items: center;
  gap: 8px;
}

/* ── BUTTONS ─────────────────────────────────────────────────── */
button, .btn {
  font-family: 'Cairo', sans-serif;
  font-size: 13.5px;
  font-weight: 700;
  cursor: pointer;
  border: none;
  border-radius: var(--r-sm);
  padding: 9px 18px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  transition: transform var(--t), box-shadow var(--t), filter var(--t), background var(--t);
  text-decoration: none;
  white-space: nowrap;
  line-height: 1;
}
button:hover, .btn:hover { transform: translateY(-1px); }
button:active, .btn:active { transform: translateY(0) scale(.98); }

.bluebtn {
  background: linear-gradient(135deg, var(--navy2), var(--navy3));
  color: #fff;
  box-shadow: 0 4px 14px rgba(13,31,60,.25);
}
.bluebtn:hover { box-shadow: 0 8px 24px rgba(13,31,60,.30); filter: brightness(1.12); }

.teal-btn {
  background: linear-gradient(135deg, var(--teal), var(--teal2));
  color: #fff;
  box-shadow: 0 4px 14px var(--teal-glow);
}
.teal-btn:hover { box-shadow: 0 8px 24px var(--teal-glow); filter: brightness(1.08); }

.green {
  background: linear-gradient(135deg, #0a7a52, var(--green));
  color: #fff;
  box-shadow: 0 4px 14px rgba(15,140,94,.22);
}
.green:hover { box-shadow: 0 8px 22px rgba(15,140,94,.30); filter: brightness(1.08); }

.redbtn {
  background: linear-gradient(135deg, #a93226, var(--red));
  color: #fff;
  box-shadow: 0 4px 12px rgba(192,57,43,.22);
}
.redbtn:hover { filter: brightness(1.1); }

.yellowbtn {
  background: linear-gradient(135deg, #b85c00, var(--amber));
  color: #fff;
}

.light {
  background: var(--white);
  color: var(--navy);
  border: 1.5px solid var(--border);
  box-shadow: var(--sh-sm);
}
.light:hover { border-color: var(--border2); background: #f4f6fb; }

.ghost-teal {
  background: var(--teal-soft);
  color: var(--teal);
  border: 1.5px solid rgba(14,165,160,.25);
}
.ghost-teal:hover { background: rgba(14,165,160,.14); }

/* Header action buttons (on dark bg) */
.hdr-btn {
  background: rgba(255,255,255,.10);
  color: rgba(255,255,255,.85);
  border: 1px solid rgba(255,255,255,.18);
  border-radius: var(--r-sm);
  padding: 8px 14px;
  font-size: 13px;
  font-weight: 600;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  transition: background var(--t);
  cursor: pointer;
  font-family: 'Cairo', sans-serif;
}
.hdr-btn:hover { background: rgba(255,255,255,.18); }

/* Logout btn */
.logoutBtn {
  background: rgba(192,57,43,.10);
  color: var(--red);
  border: 1.5px solid rgba(192,57,43,.20);
  font-weight: 700;
  border-radius: var(--r-sm);
  padding: 9px 16px;
  font-size: 13px;
  cursor: pointer;
  font-family: 'Cairo', sans-serif;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: background var(--t), box-shadow var(--t);
}
.logoutBtn:hover { background: rgba(192,57,43,.16); }

/* ── USER BAR ────────────────────────────────────────────────── */
.userbar {
  max-width: 1500px;
  margin: 0 auto;
  padding: 12px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  flex-wrap: wrap;
}
.userpill {
  display: inline-flex;
  align-items: center;
  gap: 9px;
  background: var(--white);
  border: 1.5px solid var(--border);
  border-radius: 999px;
  padding: 8px 16px 8px 10px;
  font-size: 13.5px;
  font-weight: 700;
  color: var(--navy);
  box-shadow: var(--sh-sm);
}
.userpill::before {
  content: "👤";
  width: 28px;
  height: 28px;
  background: var(--teal-soft);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
}

/* ── PANELS / CARDS ──────────────────────────────────────────── */
.panel {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--r-xl);
  box-shadow: var(--sh);
  overflow: hidden;
}
.title {
  padding: 14px 20px;
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy2) 100%);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  font-size: 15px;
  font-weight: 700;
  font-family: 'Noto Kufi Arabic', sans-serif;
  min-height: 52px;
}
.title-badge {
  background: rgba(255,255,255,.15);
  border: 1px solid rgba(255,255,255,.25);
  color: #fff;
  border-radius: 999px;
  padding: 4px 12px;
  font-size: 12px;
  font-weight: 600;
  white-space: nowrap;
}
.body { padding: 20px; }

/* ── LOGIN BOX ───────────────────────────────────────────────── */
.loginBox {
  max-width: 460px;
  margin: 48px auto;
  padding: 36px 32px;
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--r-xl);
  box-shadow: var(--sh-xl);
  animation: fadeUp .35s ease both;
}
.loginBox h2 {
  font-size: 24px;
  font-weight: 900;
  color: var(--navy);
  margin-bottom: 4px;
  font-family: 'Noto Kufi Arabic', sans-serif;
}
.loginBox .login-sub {
  color: var(--muted);
  font-size: 13px;
  margin-bottom: 24px;
  line-height: 1.6;
}
.login-divider {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 18px 0;
  color: var(--muted);
  font-size: 12px;
}
.login-divider::before, .login-divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ── FORM FIELDS ─────────────────────────────────────────────── */
.field {
  display: flex;
  flex-direction: column;
  gap: 5px;
  margin-bottom: 0; /* controlled by grid gap */
}
.field label {
  font-size: 12px;
  font-weight: 700;
  color: var(--navy);
  letter-spacing: .3px;
  text-transform: uppercase;
}
input, select, textarea, .answer {
  font-family: 'Cairo', sans-serif;
  font-size: 14px;
  color: var(--ink);
  background: var(--ivory);
  border: 1.5px solid var(--border);
  border-radius: var(--r-sm);
  padding: 10px 13px;
  width: 100%;
  transition: border-color var(--t), box-shadow var(--t), background var(--t);
  outline: none;
}
input:focus, select:focus, textarea:focus, .answer:focus {
  border-color: var(--teal);
  background: var(--white);
  box-shadow: 0 0 0 3px var(--teal-glow);
}
textarea { resize: vertical; min-height: 76px; }

/* Field grid */
.topFields {
  display: grid;
  grid-template-columns: repeat(4, minmax(0,1fr));
  gap: 12px 14px;
  margin-bottom: 18px;
}
.span2 { grid-column: span 2; }
.span4 { grid-column: 1 / -1; }

/* ── MAIN LAYOUT GRIDS ───────────────────────────────────────── */
.wrap, .adminWrap {
  max-width: 1500px;
  margin: 20px auto 40px;
  padding: 0 24px;
  display: grid;
  gap: 20px;
}
.wrap       { grid-template-columns: 360px minmax(0,1fr); }
.adminWrap  { grid-template-columns: 380px minmax(0,1fr); }

.page-wrap {
  max-width: 1500px;
  margin: 20px auto 40px;
  padding: 0 24px;
}
.settingsWrap {
  max-width: 900px;
  margin: 20px auto 40px;
  padding: 0 24px;
}

/* ── SEARCH INPUT ────────────────────────────────────────────── */
.search {
  width: 100%;
  background: var(--ivory);
  border: 1.5px solid var(--border);
  border-radius: var(--r-sm);
  padding: 10px 14px;
  font-size: 14px;
  font-family: 'Cairo', sans-serif;
  color: var(--ink);
  margin-bottom: 10px;
  transition: border-color var(--t), box-shadow var(--t);
  outline: none;
}
.search:focus { border-color: var(--teal); box-shadow: 0 0 0 3px var(--teal-glow); background: var(--white); }

/* ── CHIPS / CATEGORY FILTER ─────────────────────────────────── */
.chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
.chip {
  font-family: 'Cairo', sans-serif;
  font-size: 12.5px;
  font-weight: 600;
  cursor: pointer;
  border: 1.5px solid var(--border);
  background: var(--ivory);
  color: var(--body-text);
  border-radius: 999px;
  padding: 5px 12px;
  transition: all var(--t);
  white-space: nowrap;
}
.chip:hover:not(.active) { border-color: var(--teal); color: var(--teal); }
.chip.active { background: var(--teal); color: #fff; border-color: var(--teal); box-shadow: 0 3px 10px var(--teal-glow); }

/* ── SYMPTOMS GRID ───────────────────────────────────────────── */
.gridSymptoms {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 7px;
  max-height: 580px;
  overflow-y: auto;
  padding-inline-end: 3px;
}
.gridSymptoms::-webkit-scrollbar { width: 4px; }
.gridSymptoms::-webkit-scrollbar-track { background: transparent; }
.gridSymptoms::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

.symbtn {
  font-family: 'Cairo', sans-serif;
  font-size: 12.5px;
  font-weight: 600;
  cursor: pointer;
  border: 1.5px solid var(--border);
  background: var(--ivory);
  color: var(--navy);
  border-radius: var(--r-sm);
  min-height: 50px;
  padding: 9px 8px;
  text-align: center;
  transition: all var(--t);
  line-height: 1.4;
  position: relative;
  overflow: hidden;
}
.symbtn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, var(--teal), var(--teal2));
  opacity: 0;
  transition: opacity var(--t);
}
.symbtn span { position: relative; z-index: 1; }
.symbtn:hover { border-color: var(--teal); color: var(--teal); transform: translateY(-1px); box-shadow: var(--sh-sm); }
.symbtn.sel { border-color: var(--teal); color: #fff; box-shadow: 0 4px 16px var(--teal-glow); }
.symbtn.sel::before { opacity: 1; }

/* ── SELECTED TAGS ───────────────────────────────────────────── */
.selected {
  margin-top: 12px;
  border: 1.5px dashed var(--border2);
  border-radius: var(--r-sm);
  background: rgba(14,165,160,.03);
  padding: 10px;
  min-height: 46px;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  align-items: flex-start;
}
.tag {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: var(--teal);
  color: #fff;
  border-radius: 999px;
  padding: 4px 10px 4px 12px;
  font-size: 12.5px;
  font-weight: 600;
  animation: fadeUp .15s ease;
}
.tag button {
  border: none;
  background: rgba(255,255,255,.25);
  color: #fff;
  border-radius: 50%;
  width: 17px;
  height: 17px;
  padding: 0;
  font-size: 11px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background var(--t);
}
.tag button:hover { background: rgba(255,255,255,.40); }

/* ── CARDS GRID (consultation output) ───────────────────────── */
.cards { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  box-shadow: var(--sh-sm);
  overflow: hidden;
  transition: box-shadow var(--t);
  animation: fadeUp .25s ease both;
}
.card:hover { box-shadow: var(--sh); }
.card h3 {
  padding: 12px 16px;
  font-size: 14px;
  font-weight: 700;
  font-family: 'Noto Kufi Arabic', sans-serif;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 7px;
  background: linear-gradient(180deg, #fff 0%, var(--ivory) 100%);
  color: var(--navy);
}
.card h3::before { content: "●"; color: var(--teal); font-size: 8px; }
.card.red h3    { background: var(--red-soft); color: var(--red); }
.card.red h3::before { color: var(--red); }
.card.green h3  { background: var(--green-soft); color: var(--green); }
.card.green h3::before { color: var(--green); }
.card.wide, .wide { grid-column: 1 / -1; }
.content { padding: 14px 16px; }

/* ── QUESTION ROWS ───────────────────────────────────────────── */
.qgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.qrow {
  border: 1px solid var(--border);
  background: var(--ivory);
  border-radius: var(--r-sm);
  padding: 12px;
  transition: border-color var(--t);
}
.qrow:hover { border-color: var(--border2); }
.qrow label {
  display: block;
  font-size: 12.5px;
  font-weight: 700;
  color: var(--navy);
  margin-bottom: 8px;
  line-height: 1.5;
}
.choices { display: flex; gap: 6px; flex-wrap: wrap; }
.choice {
  font-family: 'Cairo', sans-serif;
  font-size: 12.5px;
  font-weight: 600;
  cursor: pointer;
  border: 1.5px solid var(--border);
  background: var(--white);
  color: var(--body-text);
  border-radius: 999px;
  padding: 6px 12px;
  transition: all var(--t);
}
.choice:hover { border-color: var(--teal); color: var(--teal); }
.choice.active { background: var(--teal); color: #fff; border-color: var(--teal); box-shadow: 0 2px 8px var(--teal-glow); }
.answer { margin-top: 6px; font-size: 13px; }

/* ── DANGER BANNER ───────────────────────────────────────────── */
.danger {
  grid-column: 1 / -1;
  background: var(--red-soft);
  border: 1.5px solid rgba(192,57,43,.25);
  color: var(--red);
  font-weight: 700;
  border-radius: var(--r-sm);
  padding: 14px 16px;
  line-height: 1.9;
  font-size: 13.5px;
  position: relative;
  padding-inline-start: 44px;
}
.danger::before {
  content: "⚠";
  position: absolute;
  right: 14px; top: 14px;
  font-size: 18px;
}

/* ── FLAGS ───────────────────────────────────────────────────── */
.flag {
  color: var(--red);
  font-weight: 600;
  font-size: 13.5px;
  padding: 8px 0;
  border-bottom: 1px solid rgba(192,57,43,.12);
  display: flex;
  align-items: flex-start;
  gap: 8px;
}
.flag:last-child { border-bottom: none; }
.flag::before { content: "⚑"; font-size: 14px; flex-shrink: 0; margin-top: 1px; }

/* ── SUMMARY BOX ─────────────────────────────────────────────── */
.summary {
  background: var(--navy);
  color: #c8d8f0;
  border-radius: var(--r-sm);
  padding: 16px 18px;
  white-space: pre-wrap;
  line-height: 2;
  min-height: 120px;
  font-size: 13.5px;
  font-family: 'Cairo', sans-serif;
  border: 1px solid rgba(255,255,255,.06);
}

/* ── SAVE BAR ────────────────────────────────────────────────── */
.savebar {
  max-width: 1500px;
  margin: 0 auto 16px;
  padding: 0 24px;
  display: flex;
  gap: 10px;
  justify-content: flex-end;
}
.historyWrap {
  max-width: 1500px;
  margin: 0 auto 20px;
  padding: 0 24px;
}

/* ── EMPTY STATE ─────────────────────────────────────────────── */
.empty {
  text-align: center;
  color: var(--muted);
  border: 2px dashed var(--border);
  border-radius: var(--r-sm);
  background: var(--ivory);
  padding: 32px 16px;
  font-size: 14px;
}

/* ── HELP BOX ────────────────────────────────────────────────── */
.helpBox {
  background: rgba(201,168,76,.08);
  border: 1px solid rgba(201,168,76,.22);
  border-inline-start: 3px solid var(--gold);
  border-radius: var(--r-sm);
  padding: 12px 14px;
  font-size: 13px;
  line-height: 1.75;
  color: #7a5c10;
  margin-bottom: 16px;
}

/* ── BADGES ──────────────────────────────────────────────────── */
.badge, .userBadge {
  display: inline-flex;
  align-items: center;
  border-radius: 999px;
  padding: 4px 12px;
  font-size: 12px;
  font-weight: 700;
}
.badge { background: var(--teal-soft); color: var(--teal); border: 1px solid rgba(14,165,160,.2); }

/* Status badges */
.st-pending   { background: var(--amber-soft); color: #92400e; border: 1px solid rgba(217,119,6,.22); border-radius: 999px; padding: 3px 10px; font-size: 12px; font-weight: 700; }
.st-approved  { background: var(--green-soft); color: #0a5c3a; border: 1px solid rgba(15,140,94,.22); border-radius: 999px; padding: 3px 10px; font-size: 12px; font-weight: 700; }
.st-followup  { background: var(--red-soft);   color: #7f1d1d; border: 1px solid rgba(192,57,43,.22); border-radius: 999px; padding: 3px 10px; font-size: 12px; font-weight: 700; }

/* ── ROLE CARDS (home page) ──────────────────────────────────── */
.roleGrid {
  max-width: 1200px;
  margin: 28px auto;
  padding: 0 24px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 20px;
}
.roleCard {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--r-xl);
  padding: 30px 26px;
  box-shadow: var(--sh);
  transition: transform var(--t), box-shadow var(--t);
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  gap: 10px;
  animation: fadeUp .3s ease both;
  position: relative;
  overflow: hidden;
}
.roleCard::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--teal), var(--gold));
}
.roleCard:hover { transform: translateY(-4px); box-shadow: var(--sh-lg); }
.roleCard .rc-icon {
  width: 60px;
  height: 60px;
  border-radius: var(--r-lg);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  background: linear-gradient(135deg, var(--teal-soft), rgba(14,165,160,.12));
  border: 1px solid rgba(14,165,160,.2);
  margin-bottom: 4px;
}
.roleCard h2 { font-size: 19px; color: var(--navy); }
.roleCard p  { font-size: 13px; color: var(--muted); line-height: 1.65; }
.roleCard .btn { margin-top: 8px; min-width: 160px; }

/* ── MODAL ───────────────────────────────────────────────────── */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(13,31,60,.55);
  z-index: 300;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 20px;
  overflow-y: auto;
  backdrop-filter: blur(6px);
  animation: fadeIn .2s ease;
}
.sheet {
  background: var(--white);
  max-width: 1020px;
  width: 100%;
  border-radius: var(--r-xl);
  box-shadow: var(--sh-xl);
  overflow: hidden;
  margin-top: 20px;
  animation: slideDown .25s ease;
}
.sheetHeader {
  padding: 16px 20px;
  background: linear-gradient(135deg, var(--navy), var(--navy2));
  color: #fff;
  font-weight: 700;
  font-family: 'Noto Kufi Arabic', sans-serif;
  font-size: 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
}
.sheetBody { padding: 20px; }

/* ── REVIEW LIST ─────────────────────────────────────────────── */
.consultRow {
  border: 1px solid var(--border);
  background: var(--white);
  border-radius: var(--r-lg);
  padding: 14px 16px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: all var(--t);
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 12px;
  align-items: center;
  animation: fadeUp .2s ease both;
}
.consultRow:hover { border-color: var(--teal); box-shadow: 0 4px 18px var(--teal-glow); transform: translateY(-1px); }
.consultRow-icon {
  width: 40px;
  height: 40px;
  border-radius: var(--r-sm);
  background: var(--teal-soft);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
  border: 1px solid rgba(14,165,160,.2);
}
.consultRow-title { font-weight: 700; color: var(--navy); font-size: 14px; }
.consultRow-meta  { font-size: 12px; color: var(--muted); margin-top: 2px; }

/* ── ADMIN SIDEBAR LIST ──────────────────────────────────────── */
.adminList { max-height: 680px; overflow-y: auto; padding-inline-end: 2px; }
.adminList::-webkit-scrollbar { width: 4px; }
.adminList::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

.adminItem {
  border: 1px solid var(--border);
  background: var(--ivory);
  border-radius: var(--r-sm);
  padding: 10px 13px;
  margin-bottom: 7px;
  cursor: pointer;
  transition: all var(--t);
}
.adminItem:hover { border-color: var(--border2); background: #eef3fa; }
.adminItem.active { background: var(--teal-soft); border-color: rgba(14,165,160,.4); box-shadow: var(--sh-sm); }
.adminItem b { color: var(--navy); font-size: 13.5px; }
.small { font-size: 12px; color: var(--muted); line-height: 1.65; }

/* ── ADMIN EDITOR ────────────────────────────────────────────── */
.adminGrid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.questionEditor {
  border: 1px solid var(--border);
  background: var(--white);
  border-radius: var(--r-lg);
  padding: 16px;
  margin: 12px 0;
  box-shadow: var(--sh-sm);
  animation: fadeUp .2s ease;
}
.questionHeader {
  background: linear-gradient(135deg, var(--teal-soft), rgba(14,165,160,.04));
  border: 1px solid rgba(14,165,160,.2);
  border-radius: var(--r-sm);
  padding: 10px 14px;
  margin-bottom: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 8px;
}
.questionHeader b { color: var(--navy); font-size: 14px; }

/* ── MINI DETAIL FORM ────────────────────────────────────────── */
.formGrid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  border: 2px solid var(--teal);
  border-bottom: none;
  border-radius: var(--r-sm) var(--r-sm) 0 0;
  overflow: hidden;
}
.cell {
  border-inline-start: 2px solid var(--teal);
  border-bottom: 2px solid var(--teal);
  min-height: 54px;
  padding: 8px 10px;
  font-size: 13px;
  line-height: 1.6;
}
.cell:last-child { border-inline-start: 0; }
.cell label { display: block; color: var(--red); font-weight: 700; font-size: 11px; margin-bottom: 3px; text-transform: uppercase; letter-spacing: .4px; }
.cell.wide2 { grid-column: span 2; }
.cell.wide4 { grid-column: 1 / -1; }

.consultText {
  white-space: pre-wrap;
  background: var(--navy);
  color: #c8d8f0;
  border-radius: var(--r-sm);
  padding: 14px 16px;
  line-height: 2;
  font-size: 13.5px;
  font-family: 'Cairo', sans-serif;
}
.reviewBox {
  background: var(--green-soft);
  border: 1px solid rgba(15,140,94,.2);
  border-radius: var(--r-sm);
  padding: 14px;
  margin-top: 14px;
}
.signedBy {
  background: rgba(201,168,76,.08);
  border: 1px solid rgba(201,168,76,.25);
  border-radius: var(--r-sm);
  padding: 10px 14px;
  margin-top: 12px;
  font-weight: 700;
  color: #7a5c10;
  text-align: center;
}

/* ── USER TABLE ──────────────────────────────────────────────── */
.userTable {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0 7px;
}
.userTable th {
  text-align: right;
  color: var(--muted);
  font-size: 11px;
  font-weight: 700;
  padding: 4px 10px;
  text-transform: uppercase;
  letter-spacing: .5px;
}
.userTable td {
  background: var(--white);
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  padding: 10px;
  font-size: 13px;
  vertical-align: middle;
}
.userTable td:first-child  { border-inline-end: 1px solid var(--border); border-radius: 0 var(--r-sm) var(--r-sm) 0; }
.userTable td:last-child   { border-inline-start: 1px solid var(--border); border-radius: var(--r-sm) 0 0 var(--r-sm); }

/* ── TOAST ───────────────────────────────────────────────────── */
.toast {
  position: fixed;
  bottom: 24px;
  left: 24px;
  background: var(--navy);
  color: #fff;
  padding: 12px 20px;
  border-radius: var(--r-sm);
  box-shadow: var(--sh-lg);
  z-index: 999;
  font-size: 14px;
  font-weight: 700;
  animation: slideUp .2s ease;
  border-inline-start: 3px solid var(--teal);
}
.toast.ok  { border-inline-start-color: var(--green); }
.toast.err { border-inline-start-color: var(--red); }

/* ── 404 ─────────────────────────────────────────────────────── */
.notfound-wrap {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 24px;
}
.notfound-code {
  font-family: 'Noto Kufi Arabic', sans-serif;
  font-size: 140px;
  font-weight: 900;
  background: linear-gradient(135deg, var(--navy2), var(--teal));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1;
}
.notfound-title { font-size: 28px; color: var(--navy); font-weight: 900; margin-top: -8px; }
.notfound-msg   { color: var(--muted); margin-top: 10px; line-height: 1.7; }

/* ── HIDDEN ──────────────────────────────────────────────────── */
.hidden { display: none !important; }

/* ── PRIORITY BADGE ──────────────────────────────────────────── */
#priority {
  font-size: 12.5px;
  font-weight: 700;
  border-radius: 999px;
  padding: 4px 12px;
  background: rgba(255,255,255,.15);
  border: 1px solid rgba(255,255,255,.25);
  color: #fff;
}

/* ── ANIMATIONS ──────────────────────────────────────────────── */
@keyframes fadeUp   { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeIn   { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideDown{ from { transform: translateY(-16px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
@keyframes slideUp  { from { transform: translateY(12px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ── RESPONSIVE ──────────────────────────────────────────────── */
@media (max-width: 1100px) {
  .wrap, .adminWrap { grid-template-columns: 1fr; }
  .cards, .qgrid, .adminGrid { grid-template-columns: 1fr; }
  .hdr-center { display: none; }
  .roleGrid { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 700px) {
  header { padding: 0 16px; }
  .userbar, .page-wrap, .savebar, .historyWrap { padding-inline: 14px; }
  .wrap, .adminWrap { padding: 0 14px 28px; margin-top: 14px; }
  .topFields { grid-template-columns: 1fr 1fr; }
  .span2, .span4 { grid-column: span 1; }
  .gridSymptoms { grid-template-columns: 1fr 1fr; }
  .loginBox { margin: 24px 16px; padding: 24px 20px; }
  .roleGrid { grid-template-columns: 1fr; padding: 0 14px; }
  .cards { grid-template-columns: 1fr; }
}
@media (max-width: 480px) {
  .topFields { grid-template-columns: 1fr; }
  .span2 { grid-column: span 1; }
}

}
th,td{
  vertical-align:middle !important;

}

}

}
.userTable,

}
.userTable td,
.consultationsTable td,
.reviewTable td{

}

/* If lists are div-based */
.consultationRow,

  grid-template-columns:minmax(135px,1.1fr) minmax(120px,.8fr) minmax(110px,.65fr) minmax(130px,.8fr) minmax(220px,1.3fr) minmax(150px,.85fr) !important;

.consultationRow .btn,

.historyRow .btn{

}

/* 2) Review/history panels: keep content readable */
.panel .body{
  overflow-x:auto !important;
}
.panel{
  min-width:0 !important;
}
.content{
  min-width:0 !important;
}

/* 3) Symptom selected buttons: make selected text visible */
.symbtn.sel,
.symbtn.active,
.symbtn.selected,

}

<script>
function applyV95PanelScrollFix(){
  document.querySelectorAll('.panel').forEach(panel=>{
    panel.style.setProperty('overflow','hidden','important');
    const title = panel.querySelector(':scope > .title, .title:first-child');
    if(title){
      title.style.setProperty('border-radius','16px 16px 0 0','important');
      title.style.setProperty('overflow','hidden','important');
      title.style.setProperty('background-clip','padding-box','important');
    }
    const body = panel.querySelector(':scope > .body, .body');
    if(body){
      body.style.setProperty('max-width','100%','important');
      body.style.setProperty('overflow-x','auto','important');
      body.style.setProperty('overflow-y','visible','important');
    }
  });
}
setTimeout(applyV95PanelScrollFix,100);
setTimeout(applyV95PanelScrollFix,500);
setTimeout(applyV95PanelScrollFix,1200);
document.addEventListener('click',()=>setTimeout(applyV95PanelScrollFix,100),true);

function applyV103ActionButtonsFix(){
  document.querySelectorAll('table').forEach(table=>{
    const txt = table.textContent || '';
    if(!(txt.includes('فتح الاستشارة') || txt.includes('مسح'))) return;
    table.classList.add('v103-fixed-table');

    Array.from(table.rows || []).forEach(tr=>{
      Array.from(tr.cells || []).forEach(td=>{
        const cellText = (td.textContent || '').trim();
        const hasAction = td.querySelector('button,.btn,a.btn') && (
          cellText.includes('فتح الاستشارة') ||
          cellText === 'فتح' ||
          cellText.includes('مسح')
        );
        if(!hasAction) return;

        td.classList.remove('v96-row-action-cell','v97-action-cell','v86-action-cell','v87-agent-action-cell','v84-action-cell','v83-action-cell','v82-action-cell','v81-action-cell');
        td.classList.add('v103-action-cell');

        if(!td.querySelector(':scope > .v103-action-stack')){
          const stack = document.createElement('div');
          stack.className = 'v103-action-stack';
          Array.from(td.children).filter(ch=>{
            const t = (ch.textContent || '').trim();
            return ch.matches('button,.btn,a.btn') || t.includes('فتح الاستشارة') || t === 'مسح';
          }).forEach(ch=>stack.appendChild(ch));
          td.appendChild(stack);
        }

        td.querySelectorAll('button,.btn,a.btn').forEach(btn=>{
          btn.style.setProperty('position','static','important');
          btn.style.setProperty('transform','none','important');
          btn.style.setProperty('float','none','important');
          btn.style.setProperty('margin','0 auto','important');
        });
      });
    });
  });
}
setTimeout(applyV103ActionButtonsFix,50);
setTimeout(applyV103ActionButtonsFix,250);
setTimeout(applyV103ActionButtonsFix,900);
setTimeout(applyV103ActionButtonsFix,1800);
document.addEventListener('DOMContentLoaded',applyV103ActionButtonsFix);
document.addEventListener('click',()=>setTimeout(applyV103ActionButtonsFix,80),true);

</script></body>
