<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="description" content="لوحة تحليلات مكالمات فريق الاستشارات الدوائية — Pharma Triage.">
<meta name="theme-color" content="#0d1f3c">
<meta name="robots" content="noindex">
<script src="/lite-mode.js"></script>
<title>تحليلات المكالمات · Pharma Triage</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&family=Noto+Kufi+Arabic:wght@400;700;900&display=swap" media="print" onload="this.media='all'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&family=Noto+Kufi+Arabic:wght@400;700;900&display=swap"></noscript>
<style>
/* ═══════════════════════════════════════════════════════════════
   PHARMA TRIAGE — Call Analytics Dashboard
   Navy · Teal · Gold · Ivory  |  Light + Dark
═══════════════════════════════════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0d1f3c; --navy2:#162d52; --navy3:#1e3d6e;
  --teal:#0ea5a0; --teal2:#0cc8c2; --gold:#c9a84c;
  --ivory:#f9f7f2; --white:#fff;
  --bg:#eef1f6; --bg2:#f7f9fc;
  --card:#ffffff; --card-2:#fbfcfe;
  --ink:#0d1f3c; --text:#2d4060; --muted:#6b82a0;
  --border:rgba(13,31,60,.10); --border2:rgba(13,31,60,.16);
  --green:#0f8c5e; --red:#d34a3a; --amber:#d99a2b;
  --grid:rgba(13,31,60,.07);
  --heat-base:#c4eae8;
  --shadow:0 1px 2px rgba(13,31,60,.06),0 8px 28px -12px rgba(13,31,60,.18);
  --shadow-lg:0 2px 6px rgba(13,31,60,.08),0 26px 60px -22px rgba(13,31,60,.32);
  --radius:18px; --radius-sm:13px;
  --c1:#0ea5a0; --c2:#1e3d6e; --c3:#c9a84c; --c4:#5b86c4; --c5:#0f8c5e;
  --maxw:1240px;
}
[data-theme="dark"]{
  --bg:#070e1c; --bg2:#0b1424;
  --card:rgba(255,255,255,.045); --card-2:rgba(255,255,255,.03);
  --ink:#eaf1fb; --text:#cdd9ec; --muted:#8aa0c2;
  --border:rgba(255,255,255,.09); --border2:rgba(255,255,255,.16);
  --grid:rgba(255,255,255,.08);
  --heat-base:#0b2535;
  --teal:#16c3bd; --teal2:#2ee0d8; --gold:#e0c477;
  --green:#28c07e; --red:#f56b58; --amber:#ecb44b;
  --shadow:0 1px 2px rgba(0,0,0,.4),0 12px 34px -14px rgba(0,0,0,.6);
  --shadow-lg:0 2px 8px rgba(0,0,0,.45),0 32px 70px -24px rgba(0,0,0,.75);
  --c1:#16c3bd; --c2:#6ea2e8; --c3:#e0c477; --c4:#8ab0e8; --c5:#28c07e;
}
html,body{height:100%}
body{
  font-family:"Cairo",system-ui,-apple-system,"Segoe UI",sans-serif;
  color:var(--text); background:var(--bg);
  -webkit-font-smoothing:antialiased; line-height:1.6;
  background-image:
    radial-gradient(1100px 600px at 100% -8%, color-mix(in srgb, var(--teal) 12%, transparent), transparent 60%),
    radial-gradient(900px 520px at -6% 4%, color-mix(in srgb, var(--navy3) 14%, transparent), transparent 58%);
  min-height:100%;
}
h1,h2,h3,.num{font-family:"Noto Kufi Arabic","Cairo",sans-serif}
a{color:inherit;text-decoration:none}
.num{font-variant-numeric:tabular-nums;letter-spacing:-.01em}

/* ── Top bar ─────────────────────────────────────────────── */
.topbar{
  position:sticky;top:0;z-index:40;
  backdrop-filter:saturate(160%) blur(14px);
  background:color-mix(in srgb, var(--bg) 82%, transparent);
  border-bottom:1px solid var(--border);
}
.topbar-in{max-width:var(--maxw);margin:0 auto;padding:13px 20px;display:flex;align-items:center;gap:16px}
.brand{display:flex;align-items:center;gap:11px;min-width:0}
.brand-logo{
  width:42px;height:42px;border-radius:12px;flex:none;display:grid;place-items:center;
  background:linear-gradient(135deg,var(--navy2),var(--navy3));
  box-shadow:0 6px 16px -6px rgba(13,31,60,.5), inset 0 0 0 1px rgba(255,255,255,.08);
}
.brand-logo svg{width:23px;height:23px}
.brand-tx b{display:block;font-family:"Noto Kufi Arabic";font-size:1.02rem;color:var(--ink);line-height:1.2}
.brand-tx span{font-size:.74rem;color:var(--muted)}
.spacer{flex:1}
.tbtn{
  display:inline-flex;align-items:center;gap:7px;height:40px;padding:0 15px;border-radius:11px;
  border:1px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;
  font-family:inherit;font-size:.86rem;font-weight:600;transition:.18s;white-space:nowrap;
}
.tbtn:hover{border-color:var(--teal);color:var(--ink);transform:translateY(-1px)}
.tbtn svg{width:17px;height:17px}
.tbtn.icon{width:40px;padding:0;justify-content:center}

/* ── Layout ──────────────────────────────────────────────── */
.wrap{max-width:var(--maxw);margin:0 auto;padding:26px 20px 70px}
.hero{display:flex;align-items:flex-end;justify-content:space-between;gap:18px;flex-wrap:wrap;margin-bottom:22px}
.hero h1{font-size:clamp(1.5rem,3.4vw,2.15rem);color:var(--ink);line-height:1.18;font-weight:900}
.hero .pill{display:inline-flex;align-items:center;gap:7px;margin-top:9px;font-size:.82rem;color:var(--muted)}
.hero .pill b{color:var(--teal)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--teal);box-shadow:0 0 0 4px var(--teal-soft, color-mix(in srgb,var(--teal) 22%,transparent))}

/* segmented control */
.seg{display:inline-flex;background:var(--card);border:1px solid var(--border);border-radius:13px;padding:5px;gap:4px;box-shadow:var(--shadow)}
.seg button{
  border:0;background:transparent;color:var(--muted);font-family:inherit;font-weight:700;font-size:.88rem;
  padding:9px 17px;border-radius:9px;cursor:pointer;transition:.18s;display:flex;align-items:center;gap:7px;white-space:nowrap;
}
.seg button svg{width:16px;height:16px}
.seg button.on{color:#fff;background:linear-gradient(135deg,var(--teal),var(--teal2));box-shadow:0 8px 18px -8px color-mix(in srgb,var(--teal) 70%,transparent)}
[data-theme="dark"] .seg button.on{color:#04222a}

/* ── KPI cards ───────────────────────────────────────────── */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:22px 0}
.kpi{
  position:relative;overflow:hidden;background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);padding:17px 18px;box-shadow:var(--shadow);
  transition:transform .2s, box-shadow .2s, border-color .2s;
}
.kpi:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);border-color:var(--border2)}
.kpi::before{content:"";position:absolute;inset-inline-start:0;top:0;bottom:0;width:4px;background:var(--accent,var(--teal))}
.kpi-top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:9px}
.kpi-ic{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;flex:none;
  background:color-mix(in srgb,var(--accent,var(--teal)) 14%,transparent);color:var(--accent,var(--teal))}
.kpi-ic svg{width:20px;height:20px}
.kpi-tag{font-size:.7rem;font-weight:700;padding:3px 9px;border-radius:20px;background:color-mix(in srgb,var(--accent,var(--teal)) 12%,transparent);color:var(--accent,var(--teal))}
.kpi-val{font-size:1.95rem;font-weight:900;color:var(--ink);line-height:1.05}
.kpi-label{font-size:.82rem;color:var(--muted);margin-top:3px;font-weight:600}
.kpi-sub{font-size:.74rem;color:var(--muted);margin-top:7px;display:flex;align-items:center;gap:5px}
.kpi-sub b{font-weight:800}
.up{color:var(--green)} .down{color:var(--red)} .neu{color:var(--gold)}

/* ── Panels / charts ─────────────────────────────────────── */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:1.6fr 1fr;gap:16px}
.span-2{grid-column:1 / -1}
.panel{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  box-shadow:var(--shadow);padding:18px 19px;margin-bottom:16px;
}
.panel-h{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:6px}
.panel-h h3{font-size:1.02rem;color:var(--ink);font-weight:800;display:flex;align-items:center;gap:9px}
.panel-h h3 .hi{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;background:color-mix(in srgb,var(--teal) 13%,transparent);color:var(--teal)}
.panel-h h3 .hi svg{width:17px;height:17px}
.panel-sub{font-size:.78rem;color:var(--muted);margin-bottom:14px}
.panel-tot{font-size:.78rem;color:var(--muted)}
.panel-tot b{font-family:"Noto Kufi Arabic";color:var(--ink);font-size:1.05rem;font-weight:800}

/* svg chart bits */
.chart{width:100%;display:block;overflow:visible;direction:ltr}
.gl{stroke:var(--grid);stroke-width:1}
.axt{fill:var(--muted);font-size:11px;font-family:"Cairo",sans-serif}
.bar{transition:opacity .15s;cursor:pointer}
.bar:hover{opacity:.82}
.barlbl{fill:var(--muted);font-size:10.5px;font-family:"Cairo";font-variant-numeric:tabular-nums}

/* legend */
.legend{display:flex;flex-wrap:wrap;gap:14px;margin-top:10px;font-size:.8rem;color:var(--muted)}
.legend span{display:inline-flex;align-items:center;gap:7px}
.legend i{width:11px;height:11px;border-radius:3px;display:inline-block}

/* donut center */
.donut-wrap{display:flex;align-items:center;gap:18px;flex-wrap:wrap;justify-content:center}
.donut-stat{display:flex;flex-direction:column;gap:9px;min-width:130px}
.ds{display:flex;align-items:center;gap:10px}
.ds i{width:12px;height:12px;border-radius:4px;flex:none}
.ds .ds-v{font-family:"Noto Kufi Arabic";font-weight:800;color:var(--ink)}
.ds .ds-l{font-size:.78rem;color:var(--muted)}

/* calendar heatmap */
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.cal .cell{aspect-ratio:1;border-radius:8px;display:grid;place-items:center;font-size:.74rem;font-weight:700;
  color:var(--muted);background:var(--grid);position:relative;cursor:default;transition:transform .12s}
.cal .cell.has:hover{transform:scale(1.12);z-index:2}
.cal .cell .cd{position:absolute;top:3px;inset-inline-end:5px;font-size:.62rem;opacity:.7;font-weight:600}
.cal .head{aspect-ratio:auto;background:none;color:var(--muted);font-size:.72rem;font-weight:700;padding-bottom:2px}
.cal-scale{display:flex;align-items:center;gap:6px;justify-content:flex-end;margin-top:11px;font-size:.72rem;color:var(--muted)}
.cal-scale i{width:15px;height:13px;border-radius:3px}

/* table */
.tbl{width:100%;border-collapse:collapse;font-size:.86rem}
.tbl th{text-align:start;color:var(--muted);font-weight:700;font-size:.76rem;padding:9px 10px;border-bottom:1px solid var(--border);cursor:pointer;user-select:none}
.tbl th:hover{color:var(--ink)}
.tbl td{padding:10px;border-bottom:1px solid var(--border)}
.tbl tr:last-child td{border-bottom:0}
.tbl tbody tr{transition:background .12s}
.tbl tbody tr:hover{background:color-mix(in srgb,var(--teal) 6%,transparent)}
.rank{width:26px;height:26px;border-radius:8px;display:inline-grid;place-items:center;font-family:"Noto Kufi Arabic";font-weight:800;font-size:.78rem;
  background:color-mix(in srgb,var(--navy3) 12%,transparent);color:var(--navy3)}
[data-theme="dark"] .rank{color:var(--c2)}
.rank.g1{background:linear-gradient(135deg,var(--gold),#e6cf86);color:#3a2e07}
.tbl .mini{height:7px;border-radius:5px;background:linear-gradient(90deg,var(--teal),var(--teal2));min-width:5px}
.tbl .mwrap{background:var(--grid);border-radius:5px;overflow:hidden;width:100%;max-width:160px}

/* comparison */
.cmp-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px}
.cmp{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}
.cmp h4{font-size:.82rem;color:var(--muted);font-weight:700;margin-bottom:13px}
.cmp-row{display:flex;align-items:center;gap:10px;margin-bottom:11px}
.cmp-row .nm{width:74px;font-size:.78rem;color:var(--text);font-weight:600;flex:none}
.cmp-row .track{flex:1;height:10px;border-radius:6px;background:var(--grid);overflow:hidden}
.cmp-row .fill{height:100%;border-radius:6px}
.cmp-row .vv{width:62px;text-align:end;font-family:"Noto Kufi Arabic";font-weight:800;font-size:.85rem;color:var(--ink);flex:none}

/* tooltip */
#tip{position:fixed;z-index:99;pointer-events:none;opacity:0;transform:translateY(4px);transition:opacity .12s;
  background:var(--navy);color:#fff;padding:8px 11px;border-radius:10px;font-size:.78rem;font-weight:600;
  box-shadow:0 10px 30px -8px rgba(0,0,0,.5);white-space:nowrap}
#tip b{font-family:"Noto Kufi Arabic";font-weight:800}
[data-theme="dark"] #tip{background:#10243f;border:1px solid var(--border2)}

footer{max-width:var(--maxw);margin:0 auto;padding:8px 20px 40px;color:var(--muted);font-size:.78rem;text-align:center}

.fade{opacity:0;transform:translateY(14px);animation:fade .5s cubic-bezier(.2,.7,.3,1) forwards}
@keyframes fade{to{opacity:1;transform:none}}

/* ── Consult-team leaderboard ─────────────────────────────── */
.ct-hdr{
  display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;
  padding:18px 22px;
  background:linear-gradient(135deg,#070e1c 0%,#0d1f3c 50%,#0b2e3d 100%);
  border-radius:var(--radius-sm) var(--radius-sm) 0 0;
  margin:-18px -19px 20px;
  position:relative;overflow:hidden;
}
.ct-hdr::after{
  content:'';position:absolute;inset-inline-end:-60px;top:-60px;
  width:200px;height:200px;border-radius:50%;
  background:radial-gradient(circle,rgba(14,200,194,.18),transparent 65%);
  pointer-events:none;
}
.ct-hdr-left{display:flex;align-items:center;gap:10px;flex-wrap:wrap;position:relative;z-index:1}
.ct-hdr-title{
  font-family:"Noto Kufi Arabic","Cairo",sans-serif;font-size:.96rem;font-weight:900;
  color:#fff;display:flex;align-items:center;gap:9px;
}
.ct-hdr-badge{
  font-size:.66rem;font-weight:800;
  background:rgba(14,200,194,.13);border:1px solid rgba(14,200,194,.30);
  color:#0cc8c2;padding:3px 10px;border-radius:20px;
}
.ct-legend{display:flex;gap:14px;font-size:.7rem;color:rgba(255,255,255,.5);position:relative;z-index:1}
.ct-legend span{display:flex;align-items:center;gap:5px}
.ct-legend i{width:24px;height:5px;border-radius:3px;flex:none}

/* Card grid */
.ct-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(290px,1fr));
  gap:14px;
}

/* Individual agent card */
.ct-card{
  position:relative;border-radius:16px;padding:18px;overflow:hidden;
  background:var(--card);border:1px solid var(--border);
  box-shadow:var(--shadow);
  transition:transform .22s cubic-bezier(.2,.8,.2,1),box-shadow .22s,border-color .18s;
  animation:ctCardIn .4s cubic-bezier(.22,.61,.36,1) both;
}
@keyframes ctCardIn{from{opacity:0;transform:translateY(12px) scale(.97);}to{opacity:1;transform:none;}}
.ct-card:hover{transform:translateY(-5px) scale(1.012);box-shadow:var(--shadow-lg);}
/* Top-3 accent tops */
.ct-card.ct-top1{border-color:rgba(201,168,76,.35);}
.ct-card.ct-top2{border-color:rgba(180,186,196,.28);}
.ct-card.ct-top3{border-color:rgba(180,93,9,.28);}
.ct-card.ct-top1::before,.ct-card.ct-top2::before,.ct-card.ct-top3::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
}
.ct-card.ct-top1::before{background:linear-gradient(90deg,transparent,#c9a84c,#f0d060,#c9a84c,transparent);}
.ct-card.ct-top2::before{background:linear-gradient(90deg,transparent,#9ca3b0,#cdd2da,#9ca3b0,transparent);}
.ct-card.ct-top3::before{background:linear-gradient(90deg,transparent,#b45309,#e07010,#b45309,transparent);}
/* Ambient glow blob in corner */
.ct-card-blob{
  position:absolute;inset-inline-start:-30px;bottom:-30px;
  width:110px;height:110px;border-radius:50%;
  filter:blur(22px);pointer-events:none;opacity:.5;
}
/* Card header: rank + avatar + name */
.ct-card-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:16px;}
.ct-rank{
  width:32px;height:32px;border-radius:10px;display:inline-grid;
  place-items:center;font-family:"Noto Kufi Arabic","Cairo";
  font-weight:900;font-size:.82rem;flex:none;
}
.ct-rank.r1{background:linear-gradient(135deg,#c9a84c,#f0d468);color:#3a2800;box-shadow:0 4px 12px rgba(201,168,76,.4)}
.ct-rank.r2{background:linear-gradient(135deg,#8e99a8,#c6cdd6);color:#1a2035;box-shadow:0 4px 12px rgba(140,155,168,.3)}
.ct-rank.r3{background:linear-gradient(135deg,#b45309,#e07212);color:#fff;box-shadow:0 4px 12px rgba(180,83,9,.35)}
.ct-rank.rn{background:color-mix(in srgb,var(--navy3) 12%,transparent);color:var(--muted);font-size:.78rem}
/* Avatar circle with initials */
.ct-avatar{
  width:42px;height:42px;border-radius:13px;display:grid;place-items:center;
  font-family:"Noto Kufi Arabic","Cairo";font-size:.95rem;font-weight:900;
  flex:none;border:1px solid rgba(255,255,255,.12);
}
/* Name area */
.ct-name-area{flex:1;min-width:0}
.ct-name{
  font-size:.85rem;font-weight:700;color:var(--ink);line-height:1.3;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
  overflow:hidden;margin-bottom:5px;
}
.ct-login{
  display:inline-flex;align-items:center;gap:4px;
  font-size:.64rem;font-weight:900;color:var(--teal);letter-spacing:.02em;
  background:color-mix(in srgb,var(--teal) 9%,transparent);
  border:1px solid color-mix(in srgb,var(--teal) 24%,transparent);
  padding:2px 8px;border-radius:6px;font-family:"Cairo",monospace;
}
.ct-login::before{content:"#";opacity:.6}
/* Metrics */
.ct-metrics{display:flex;flex-direction:column;gap:10px}
.ct-metric-hdr{
  display:flex;align-items:baseline;justify-content:space-between;gap:6px;margin-bottom:5px;
}
.ct-metric-lbl{font-size:.68rem;font-weight:700;color:var(--muted);white-space:nowrap}
.ct-metric-val{
  font-size:1.08rem;font-weight:900;font-family:"Cairo",sans-serif;
  font-variant-numeric:tabular-nums;color:var(--ink);
}
.ct-metric-sub{font-size:.64rem;font-weight:600;color:var(--muted)}
.ct-bar-track{height:7px;border-radius:4px;background:var(--grid);overflow:hidden}
.ct-bar-fill{height:100%;border-radius:4px;transition:width .5s cubic-bezier(.2,.8,.2,1)}
/* Divider */
.ct-divider{height:1px;background:var(--border);margin:10px 0}

/* palette switcher */
.pal-sw{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.pal-sw-lbl{font-size:.7rem;color:var(--muted);font-weight:600;white-space:nowrap}
.pal-btn{
  width:22px;height:22px;border-radius:6px;padding:0;cursor:pointer;
  transition:transform .14s,box-shadow .14s;border:none;
}
.pal-btn:hover{transform:scale(1.2);}
.pal-btn:first-of-type{width:44px;border-radius:6px;}  /* wider for gradient thermal */
/* month row */
#monthRow{max-width:var(--maxw);margin:0 auto;padding:0 20px 16px;display:flex;justify-content:flex-end}
#monthRow .seg{margin:0}

@media(max-width:900px){
  .kpis{grid-template-columns:repeat(2,1fr)}
  .grid2,.grid3,.cmp-grid{grid-template-columns:1fr}
}
@media(max-width:520px){
  .hero{align-items:flex-start}
  .seg{width:100%;overflow:auto}
  .brand-tx span{display:none}
}

/* ── Portrait lock overlay ── */
#portraitLock{
  display:none;position:fixed;inset:0;z-index:9999;
  background:var(--navy,#0d1f3c);
  align-items:center;justify-content:center;flex-direction:column;
  gap:20px;padding:32px;text-align:center;
}
@media(orientation:portrait) and (max-width:900px){
  #portraitLock{display:flex;}
  body>*:not(#portraitLock){visibility:hidden;}
}
.pl-icon{
  width:72px;height:72px;border-radius:20px;
  background:rgba(14,200,194,.12);border:1px solid rgba(14,200,194,.28);
  display:grid;place-items:center;
  animation:plRotate 2.2s ease-in-out infinite;
}
@keyframes plRotate{
  0%,100%{transform:rotate(0deg);}
  40%{transform:rotate(90deg);}

const $ = (s,r=document)=>r.querySelector(s);
const el = (t,a={},...k)=>{const n=document.createElement(t);for(const x in a){if(x==="class")n.className=a[x];else if(x==="html")n.innerHTML=a[x];else n.setAttribute(x,a[x]);}k.flat().forEach(c=>n.append(c));return n;};
const fmt = n => (n==null?"—":Number(n).toLocaleString("en-US"));
const DOW_AR = {Monday:"الإثنين",Tuesday:"الثلاثاء",Wednesday:"الأربعاء",Thursday:"الخميس",Friday:"الجمعة",Saturday:"السبت",Sunday:"الأحد"};
const hourNum = s => parseInt(String(s).split(":")[0],10);
const sortHours = arr => [...arr].sort((a,b)=>hourNum(a.k)-hourNum(b.k));
const hh = s => { const t=String(s).split(":"); return t[0]+":"+(t[1]||"00"); };
// "0:04:05" -> "4:05" , "1:11:35" -> "1:11:35"
function trimTime(s){ if(s==null) return "—"; const p=String(s).split(":"); if(p.length===3&&p[0]==="0") return (+p[1])+":"+p[2]; return s; }
function secsToHM(sec){ if(sec==null) return "—"; const h=Math.floor(sec/3600), m=Math.round((sec%3600)/60); return h?`${h} س ${m} د`:`${m} د`; }
const pct = (a,b)=> b? Math.round(a/b*1000)/10 : 0;

/* tooltip */
const tip=$("#tip");
function showTip(e,html){ tip.innerHTML=html; tip.style.opacity=1;
  const x=(e.touches?e.touches[0].clientX:e.clientX), y=(e.touches?e.touches[0].clientY:e.clientY);
  tip.style.left=Math.min(x+14,innerWidth-tip.offsetWidth-8)+"px"; tip.style.top=(y-tip.offsetHeight-10)+"px"; }
function hideTip(){ tip.style.opacity=0; }

/* css var color */
const cssv = v => getComputedStyle(document.documentElement).getPropertyValue(v).trim();

/* count-up */
function countUp(node,to,suffix=""){
  const dur=900, t0=performance.now(), from=0;
  function step(t){ const p=Math.min((t-t0)/dur,1); const e=1-Math.pow(1-p,3);
    let val=from+(to-from)*e;
    node.textContent=(Number.isInteger(to)?Math.round(val).toLocaleString("en-US"):(Math.round(val*10)/10).toLocaleString("en-US"))+suffix;
    if(p<1)requestAnimationFrame(step);}
  requestAnimationFrame(step);
}

const NS="http://www.w3.org/2000/svg";
function svg(w,h){ const s=document.createElementNS(NS,"svg"); s.setAttribute("viewBox",`0 0 ${w} ${h}`); s.setAttribute("class","chart"); s.setAttribute("preserveAspectRatio","none"); s.setAttribute("direction","ltr"); return s; }
function S(tag,at){ const e=document.createElementNS(NS,tag); for(const k in at)e.setAttribute(k,at[k]); return e; }

/* vertical bars */
function barV(data,{h=230,color="var(--teal)",fmtv=fmt,label="مكالمة"}={}){
  const W=720,H=h, padL=38,padB=26,padT=14,padR=8;
  const s=svg(W,H); const max=Math.max(...data.map(d=>d.v),1);
  const cw=(W-padL-padR)/data.length, bw=Math.min(cw*0.62,34);
  for(let i=0;i<=4;i++){ const y=padT+(H-padT-padB)*i/4; const v=Math.round(max*(1-i/4));
    s.append(S("line",{x1:padL,x2:W-padR,y1:y,y2:y,class:"gl"}));
    const tx=S("text",{x:padL-6,y:y+3,class:"axt","text-anchor":"end"}); tx.textContent=fmt(v); s.append(tx);
  }
  data.forEach((d,i)=>{
    const x=padL+cw*i+(cw-bw)/2, bh=(H-padT-padB)*(d.v/max), y=H-padB-bh;
    const grad="g"+Math.random().toString(36).slice(2,7);
    const lg=S("linearGradient",{id:grad,x1:0,y1:0,x2:0,y2:1});
    lg.append(S("stop",{offset:0,"stop-color":color,"stop-opacity":1}));
    lg.append(S("stop",{offset:1,"stop-color":color,"stop-opacity":.55}));
    s.append(lg);
    const r=S("rect",{x,y,width:bw,height:Math.max(bh,1),rx:Math.min(bw/2.4,6),fill:`url(#${grad})`,class:"bar"});
    r.addEventListener("mousemove",e=>showTip(e,`<b>${fmtv(d.v)}</b> ${label}<br>${d.k}`));
    r.addEventListener("mouseleave",hideTip);
    s.append(r);
    if(i%(data.length>16?2:1)===0){ const t=S("text",{x:x+bw/2,y:H-padB+15,class:"axt","text-anchor":"middle"}); t.textContent=hh(d.k); s.append(t); }
  });
  return s;

function barH(data,{color="var(--teal)",rowh=34,fmtv=fmt,label="مكالمة",arDay=false,labelW=190,maxch=16}={}){
  const W=720, padL=labelW, padR=54, padT=6, H=padT*2+data.length*rowh;
  const s=svg(W,H); const max=Math.max(...data.map(d=>d.v),1);
  data.forEach((d,i)=>{
    const y=padT+i*rowh+rowh/2; const bw=(W-padL-padR)*(d.v/max);
    const nm=arDay?(DOW_AR[d.k]||d.k):d.k;
    const disp=(maxch&&String(nm).length>maxch)?String(nm).slice(0,maxch-1)+"…":nm;
    const lt=S("text",{x:padL-8,y:y+4,class:"axt","text-anchor":"end",direction:"ltr"}); lt.textContent=disp; lt.style.fontWeight=600; s.append(lt);
    s.append(S("rect",{x:padL,y:y-9,width:W-padL-padR,height:18,rx:9,fill:"var(--grid)"}));
    const grad="g"+Math.random().toString(36).slice(2,7);
    const lg=S("linearGradient",{id:grad,x1:0,y1:0,x2:1,y2:0});
    lg.append(S("stop",{offset:0,"stop-color":color,"stop-opacity":.7}));
    lg.append(S("stop",{offset:1,"stop-color":color,"stop-opacity":1}));
    s.append(lg);
    const r=S("rect",{x:padL,y:y-9,width:Math.max(bw,3),height:18,rx:9,fill:`url(#${grad})`,class:"bar"});
    r.addEventListener("mousemove",e=>showTip(e,`<b>${fmtv(d.v)}</b> ${label}<br>${nm}`));
    r.addEventListener("mouseleave",hideTip); s.append(r);
    const vt=S("text",{x:Math.min(padL+bw+7,W-padR+44),y:y+4,class:"barlbl","text-anchor":"start"}); vt.textContent=fmtv(d.v); s.append(vt);
  });
  return s;
}

/* area / line */
function area(data,{h=250,color="var(--teal)",fmtv=fmt,label="مكالمة"}={}){
  const W=720,H=h, padL=40,padB=30,padT=14,padR=12;
  const s=svg(W,H); const max=Math.max(...data.map(d=>d.v),1)*1.08;
  const X=i=>padL+(W-padL-padR)*i/(data.length-1);
  const Y=v=>padT+(H-padT-padB)*(1-v/max);
  for(let i=0;i<=4;i++){ const y=padT+(H-padT-padB)*i/4;
    s.append(S("line",{x1:padL,x2:W-padR,y1:y,y2:y,class:"gl"}));
    const tx=S("text",{x:padL-6,y:y+3,class:"axt","text-anchor":"end"}); tx.textContent=fmt(Math.round(max*(1-i/4))); s.append(tx);
  }
  let dpath="", apath=`M ${X(0)} ${H-padB} `;
  data.forEach((d,i)=>{ const x=X(i),y=Y(d.v); dpath+=(i?"L":"M")+` ${x} ${y} `; apath+=`L ${x} ${y} `; });
  apath+=`L ${X(data.length-1)} ${H-padB} Z`;
  const grad="ga"+Math.random().toString(36).slice(2,7);
  const lg=S("linearGradient",{id:grad,x1:0,y1:0,x2:0,y2:1});
  lg.append(S("stop",{offset:0,"stop-color":color,"stop-opacity":.34}));
  lg.append(S("stop",{offset:1,"stop-color":color,"stop-opacity":0}));
  s.append(lg);
  s.append(S("path",{d:apath,fill:`url(#${grad})`}));
  s.append(S("path",{d:dpath,fill:"none",stroke:color,"stroke-width":2.4,"stroke-linejoin":"round","stroke-linecap":"round"}));
  data.forEach((d,i)=>{
    const x=X(i),y=Y(d.v);
    const c=S("circle",{cx:x,cy:y,r:3.2,fill:"var(--card)",stroke:color,"stroke-width":2});
    const hit=S("circle",{cx:x,cy:y,r:11,fill:"transparent",class:"bar"});
    const lbl=new Date(d.k).toLocaleDateString("ar-EG",{day:"numeric",month:"short"});
    hit.addEventListener("mousemove",e=>{showTip(e,`<b>${fmtv(d.v)}</b> ${label}<br>${lbl}`);c.setAttribute("r",5);});
    hit.addEventListener("mouseleave",()=>{hideTip();c.setAttribute("r",3.2);});
    s.append(c); s.append(hit);
    if(i%4===0||i===data.length-1){ const t=S("text",{x,y:H-padB+16,class:"axt","text-anchor":"middle"}); t.textContent=new Date(d.k).getDate(); s.append(t); }
  });
  return s;
}

/* donut */
function donut(segs,{size=190}={}){
  const r=size/2, ir=r*0.62, cx=r, cy=r;
  const s=svg(size,size); s.setAttribute("preserveAspectRatio","xMidYMid meet"); s.style.maxWidth=size+"px";
  const tot=segs.reduce((a,b)=>a+b.v,0)||1; let ang=-Math.PI/2;
  segs.forEach(sg=>{
    const a2=ang+sg.v/tot*Math.PI*2;
    const x1=cx+r*Math.cos(ang),y1=cy+r*Math.sin(ang),x2=cx+r*Math.cos(a2),y2=cy+r*Math.sin(a2);
    const xi1=cx+ir*Math.cos(a2),yi1=cy+ir*Math.sin(a2),xi2=cx+ir*Math.cos(ang),yi2=cy+ir*Math.sin(ang);
    const large=(a2-ang)>Math.PI?1:0;
    const p=S("path",{d:`M ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} L ${xi1} ${yi1} A ${ir} ${ir} 0 ${large} 0 ${xi2} ${yi2} Z`,fill:sg.color,class:"bar"});
    p.addEventListener("mousemove",e=>showTip(e,`<b>${fmt(sg.v)}</b> ${sg.label}<br>${pct(sg.v,tot)}%`));
    p.addEventListener("mouseleave",hideTip);
    s.append(p); ang=a2;
  });
  const big=segs[0]?pct(segs[0].v,tot):0;
  const t1=S("text",{x:cx,y:cy-2,"text-anchor":"middle",fill:"var(--ink)","font-family":"Noto Kufi Arabic","font-size":"26","font-weight":"800"}); t1.textContent=big+"%";
  const t2=S("text",{x:cx,y:cy+18,"text-anchor":"middle",fill:"var(--muted)","font-size":"12"}); t2.textContent=segs[0]?segs[0].label:"";
  s.append(t1); s.append(t2);
  return s;
}

/*  Each stop: [t, r, g, b]
    l = light mode   d = dark mode   */
const HEAT_PALETTES={
  thermal:{
    l:[[0,240,253,244],[0.25,134,239,172],[0.52,253,224,71],[0.72,249,115,22],[1.0,220,38,38]],
    d:[[0,14,58,32],   [0.25,21,150,68],  [0.52,161,110,7],[0.72,194,67,14],[1.0,185,28,28]],
  },
  teal:{
    l:[[0,198,240,238],[1,6,86,82]],
    d:[[0,12,54,68],   [1,22,195,189]],
  },
  amber:{
    l:[[0,254,243,196],[0.5,251,191,36],[1,173,92,10]],
    d:[[0,44,26,4],    [0.5,180,120,8],[1,238,160,40]],
  },
  purple:{
    l:[[0,237,232,255],[0.5,196,181,253],[1,98,32,205]],
    d:[[0,18,11,46],   [0.5,109,40,217],[1,167,139,250]],
  },
};

function interpStops(stops,t){
  const last=stops[stops.length-1];
  if(t>=last[0]) return [last[1],last[2],last[3]];
  for(let i=0;i<stops.length-1;i++){
    const [t0,r0,g0,b0]=stops[i], [t1,r1,g1,b1]=stops[i+1];
    if(t>=t0&&t<=t1){
      const p=t1>t0?(t-t0)/(t1-t0):0;
      return [Math.round(r0+(r1-r0)*p),Math.round(g0+(g1-g0)*p),Math.round(b0+(b1-b0)*p)];
    }
  }
  return [stops[0][1],stops[0][2],stops[0][3]];
}

function heatColor(t){
  const dark=document.documentElement.getAttribute("data-theme")==="dark";
  const p=HEAT_PALETTES[HEAT_PALETTE]||HEAT_PALETTES.thermal;
  const [r,g,b]=interpStops(dark?p.d:p.l,t);
  return `rgb(${r},${g},${b})`;
}
function heatTextColor(t){
  const dark=document.documentElement.getAttribute("data-theme")==="dark";
  const p=HEAT_PALETTES[HEAT_PALETTE]||HEAT_PALETTES.thermal;
  const [r,g,b]=interpStops(dark?p.d:p.l,t);
  const lum=(0.299*r+0.587*g+0.114*b)/255;
  return lum>0.52?'#111827':'#fff';
}

      class:"pal-btn"+(isActive?" on":""),title:pl.lbl,
      style:`--pal-c:${pl.c.startsWith('linear')?'#dc2626':pl.c};`+

}

/* ════════════════ Consult-team leaderboard ════════════════ */
function consultTeamPanel(team){
  /* ── Arabic normalizer: removes diacritics, unifies alef/ya/ta ── */
  function normAr(s){
    if(!s) return '';
    return String(s).trim()
      .replace(/\s+/g,' ')
      .replace(/[أإآٱ]/g,'ا')
      .replace(/ة/g,'ه')
      .replace(/ى/g,'ي')
      .replace(/ـ/g,'')
      .replace(/[ً-ٟ]/g,'');  // strip all harakat
  }

  /* ── Customer calls map — 3 keys per employee ── */
  const ds=getDatasets();
  const custMap=new Map();
  (ds.customer?.employees||[]).forEach(e=>{
    const n=e.name; const v=e.answered;
    custMap.set(n,v);                       // exact
    custMap.set(normAr(n),v);               // normalized
    if(n?.startsWith('W-')) custMap.set(n.slice(2),v);  // strip W-
  });

  function matchCust(name,lid){
    /* 1 exact */
    if(custMap.has(name)) return custMap.get(name);
    /* 2 normalized */
    const nn=normAr(name);
    if(custMap.has(nn)) return custMap.get(nn);
    /* 3 W-loginId */
    if(lid&&custMap.has('W-'+lid)) return custMap.get('W-'+lid);
    if(lid&&custMap.has(String(lid))) return custMap.get(String(lid));
    /* 4 token intersection — all words in excel name exist in employee name */
    if(nn.length>4){
      const tokens=nn.split(' ').filter(t=>t.length>1);
      for(const[k,v]of custMap){
        const nk=normAr(k);
        if(tokens.length>=2&&tokens.every(t=>nk.includes(t))) return v;
      }
    }
    /* 5 first 12 normalized chars */
    if(nn.length>8){
      const p12=nn.slice(0,12);
      for(const[k,v]of custMap) if(normAr(k).slice(0,12)===p12) return v;
    }
    console.debug('[CT] unmatched:',name,'| lid:',lid);
    return 0;
  }

  const enriched=team.map(e=>({
    ...e,
    custCalls:matchCust(e.name,e.login_id),
    intCalls: e.consultations||0,
  }));
  const maxC=Math.max(...enriched.map(e=>e.custCalls),1);
  const maxI=Math.max(...enriched.map(e=>e.intCalls),1);
  const totalC=enriched.reduce((s,e)=>s+e.custCalls,0);
  const totalI=enriched.reduce((s,e)=>s+e.intCalls,0);

  /* ── Avatar palette ── */
  const AV=[
    {bg:'linear-gradient(135deg,#c9a84c,#f0d468)',clr:'#3a2800',blob:'rgba(201,168,76,.22)'},
    {bg:'linear-gradient(135deg,#8e99a8,#c6cdd6)',clr:'#1a2035',blob:'rgba(140,155,168,.18)'},
    {bg:'linear-gradient(135deg,#b45309,#e07212)',clr:'#fff',   blob:'rgba(180,83,9,.2)'},
    {bg:'linear-gradient(135deg,var(--teal),var(--teal2))',clr:'#042a2a',blob:'rgba(14,165,160,.18)'},
    {bg:'linear-gradient(135deg,var(--navy2),var(--navy3))',clr:'#e8f4ff',blob:'rgba(30,61,110,.2)'},
    {bg:'linear-gradient(135deg,#5b86c4,#7ba8e0)',clr:'#fff',   blob:'rgba(91,134,196,.18)'},
    {bg:'linear-gradient(135deg,#0f8c5e,#28c07e)',clr:'#fff',   blob:'rgba(15,140,94,.18)'},
  ];
  /* avatar: login number (already Latin digits) or rank fallback */
  function avatarLabel(e,i){ return e.login_id ? e.login_id : String(i+1); }

  /* ── Build panel ── */
  const p=el("div",{class:"panel span-2"});

  /* Header */
  const hdr=el("div",{class:"ct-hdr"});
  const left=el("div",{class:"ct-hdr-left"});
  const title=el("div",{class:"ct-hdr-title"});
  title.innerHTML=`<svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#0cc8c2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg> أداء فريق الاستشارات`;
  title.append(el("span",{class:"ct-hdr-badge"},`${team.length} عضو`));
  left.append(title);
  hdr.append(left);
  const leg=el("div",{class:"ct-legend"});
  leg.innerHTML=
    `<span><i style="background:linear-gradient(90deg,#5b86c4,#7ba8e0)"></i>مكالمات عملاء</span>`+
    `<span><i style="background:linear-gradient(90deg,var(--teal),var(--teal2))"></i>مكالمات داخلي</span>`;
  hdr.append(leg);
  p.append(hdr);

  /* Card grid */
  const grid=el("div",{class:"ct-grid"});
  enriched.forEach((e,i)=>{
    const rk=i===0?'r1':i===1?'r2':i===2?'r3':'rn';
    const tc=i===0?' ct-top1':i===1?' ct-top2':i===2?' ct-top3':'';
    const av=AV[Math.min(i,AV.length-1)];

    const card=el("div",{class:"ct-card"+tc,style:`animation-delay:${Math.min(i,8)*40}ms`});
    card.append(el("div",{class:"ct-card-blob",style:`background:${av.blob}`}));

    /* Top row */
    const top=el("div",{class:"ct-card-top"});
    const rnk=el("div",{class:"ct-rank "+rk}); rnk.textContent=String(i+1);
    const avEl=el("div",{class:"ct-avatar",style:`background:${av.bg};color:${av.clr};font-family:'Cairo',monospace;letter-spacing:-.5px;font-size:.78rem`});
    avEl.textContent=avatarLabel(e,i);
    const na=el("div",{class:"ct-name-area"});
    na.append(el("div",{class:"ct-name"},e.name||"—"));
    if(e.login_id) na.append(el("span",{class:"ct-login"},e.login_id));
    top.append(rnk); top.append(avEl); top.append(na);
    card.append(top);
    card.append(el("div",{class:"ct-divider"}));

    /* Metrics */
    const mets=el("div",{class:"ct-metrics"});

    /* مكالمات عملاء */
    const cSub=totalC?` · ${pct(e.custCalls,totalC)}٪`:'';
    const m1=el("div",{});
    const mh1=el("div",{class:"ct-metric-hdr"});
    mh1.append(el("span",{class:"ct-metric-lbl"},"مكالمات عملاء"));
    const v1=el("div",{style:"display:flex;align-items:baseline;gap:5px"});
    v1.append(el("span",{class:"ct-metric-val",style:"color:var(--c2)"},fmt(e.custCalls)));
    if(cSub)v1.append(el("span",{class:"ct-metric-sub"},cSub));
    mh1.append(v1); m1.append(mh1);
    const bt1=el("div",{class:"ct-bar-track"});
    bt1.append(el("div",{class:"ct-bar-fill",style:`width:${Math.round(e.custCalls/maxC*100)}%;background:linear-gradient(90deg,#5b86c4,#7ba8e0)`}));
    m1.append(bt1); mets.append(m1);

    /* مكالمات داخلي */
    const iSub=totalI?` · ${pct(e.intCalls,totalI)}٪`:'';
    const m2=el("div",{style:"margin-top:8px"});
    const mh2=el("div",{class:"ct-metric-hdr"});
    mh2.append(el("span",{class:"ct-metric-lbl"},"مكالمات داخلي"));
    const v2=el("div",{style:"display:flex;align-items:baseline;gap:5px"});
    v2.append(el("span",{class:"ct-metric-val",style:"color:var(--teal)"},fmt(e.intCalls)));
    if(iSub)v2.append(el("span",{class:"ct-metric-sub"},iSub));
    mh2.append(v2); m2.append(mh2);
    const bt2=el("div",{class:"ct-bar-track"});
    bt2.append(el("div",{class:"ct-bar-fill",style:`width:${Math.round(e.intCalls/maxI*100)}%;background:linear-gradient(90deg,var(--teal),var(--teal2))`}));
    m2.append(bt2); mets.append(m2);

    card.append(mets);
    grid.append(card);
  });
  p.append(grid);
  return p;
}

    box.append(r); rates.append(box);
  });
  /* ── Volume ratio card (customer vs internal) ── */
  const totalC=Ct.total||0, totalI=It.total||0, totalAll=Math.max(totalC+totalI,1);
  const cPct=Math.round(totalC/totalAll*100), iPct=100-cPct;

  sbar.append(el("div",{style:`flex:${totalI};background:var(--c3);border-radius:0 5px 5px 0;min-width:4px`}));
  volBox.append(sbar);
  /* Numbers with pct */
  const vRow=el("div",{style:"display:flex;gap:12px"});
  vRow.append(el("div",{style:"flex:1"},
    el("div",{class:"num",style:"font-size:1.45rem;font-weight:900;color:var(--c1)"},fmt(totalC)),
    el("div",{class:"ds-l"},`عملاء · ${cPct}٪`)));
  vRow.append(el("div",{style:"flex:1"},
    el("div",{class:"num",style:"font-size:1.45rem;font-weight:900;color:var(--c3)"},fmt(totalI)),
    el("div",{class:"ds-l"},`داخلي · ${iPct}٪`)));
  volBox.append(vRow);

  const ratio=(totalI>0?(totalI/Math.max(totalC,1)).toFixed(1):"—");
  volBox.append(el("div",{style:"margin-top:10px;padding:7px 10px;border-radius:9px;background:var(--grid);font-size:.78rem;color:var(--muted)"},

  v.append(panel("المؤشرات النسبية",IC.gauge,"جودة الخدمة لكل قناة + توزيع الحجم",rates,"span-2"));

  const g=el("div",{class:"grid2"});
  g.append(panel("اتجاه العملاء اليومي",IC.trend,`إجمالي ${fmt(Ct.total)} مكالمة`,area((C.days||[]).map(x=>({k:x.date,v:x.total})),{color:cssv("--c1"),h:215})));

  v.append(g);
}

let CUR="customer";
/* ── فلتر الفترة الزمنية (يصفّي المؤشرات والاتجاه اليومي — الشيفتات/الزملاء للشهر كامل) ── */
let DF_FROM=null, DF_TO=null;
function dfActive(){ return !!(DF_FROM && DF_TO); }
function dsView(d){
  if(!d || !dfActive()) return d;
  const days=(d.days||[]).filter(x=>x.date>=DF_FROM && x.date<=DF_TO);
  const total=days.reduce((s,x)=>s+(x.total||0),0);
  const answered=days.reduce((s,x)=>s+(x.answered||0),0);
  const abandoned=days.reduce((s,x)=>s+(x.abandoned||0),0);
  return {...d, days, totals:{total,abandoned,answered,rate:total?abandoned/total:0}, _filtered:true};
}
function periodBounds(){
  const ds=getDatasets(); const per=(ds&&ds.customer&&ds.customer.period)||'';
  const mm=per.match(/(\d{4}-\d{2}-\d{2})[^\d]+(\d{4}-\d{2}-\d{2})/);
  return mm?{lo:mm[1],hi:mm[2]}:{lo:'',hi:''};
}
function updatePeriodLabel(){
  if(dfActive()) $("#period").textContent=`${DF_FROM} → ${DF_TO}`;
  else { const ds=getDatasets(); if(ds&&ds.customer) $("#period").textContent=ds.customer.period||'—'; }
}
function buildDateBar(){
  const mr=document.getElementById('monthRow'); if(!mr) return;
  const {lo,hi}=periodBounds();
  const bar=el("div",{class:"ca-dfbar"});
  bar.innerHTML=`<span class="ca-df-ic">📅</span><span class="ca-df-lbl">الفترة الزمنية:</span>`+
    `<input type="date" id="dfFrom" class="ca-df-in" value="${lo}" min="${lo}" max="${hi}">`+
    `<span class="ca-df-sep">→</span>`+
    `<input type="date" id="dfTo" class="ca-df-in" value="${hi}" min="${lo}" max="${hi}">`+
    `<button class="ca-df-btn ca-df-apply" id="dfApply">تطبيق</button>`+
    `<button class="ca-df-btn" id="dfClear">الكل</button>`;
  mr.insertBefore(bar, mr.firstChild);
  $("#dfApply").addEventListener('click',()=>{
    const f=$("#dfFrom").value, t=$("#dfTo").value;
    if(f&&t&&f<=t){ DF_FROM=f; DF_TO=t; } else { DF_FROM=DF_TO=null; }
    updatePeriodLabel(); render();
  });
  $("#dfClear").addEventListener('click',()=>{
    DF_FROM=DF_TO=null; const b=periodBounds();
    if($("#dfFrom"))$("#dfFrom").value=b.lo; if($("#dfTo"))$("#dfTo").value=b.hi;
    updatePeriodLabel(); render();
  });
}

}
$("#themeBtn").addEventListener("click",()=>{
  const cur=document.documentElement.getAttribute("data-theme")==="dark"?"light":"dark";
  applyTheme(cur); render();
});
(function initTheme(){
  let t="light";
  try{ t=localStorage.getItem(KEY) || (matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light"); }catch(e){}
  applyTheme(t);
})();

/* boot */
function boot(){
  if(!DASH_DATA.datasets&&!DASH_DATA.months){
    $("#view").innerHTML='<div class="panel" style="text-align:center;color:var(--muted)">لم يتم تحميل البيانات. شغّل <b>python build-analytics.py</b> لتوليدها.</div>';
    return;
  }
  /* Month selector — only if multiple months exist */
  const mk=getMonthKeys();
  const monthRow=document.getElementById('monthRow');
  if(mk&&mk.length>1&&monthRow){
    CUR_MONTH=mk[mk.length-1];
    const mseg=el("div",{class:"seg"});
    mk.forEach(m=>{
      const btn=document.createElement('button');
      btn.textContent=m;
      if(m===CUR_MONTH)btn.classList.add("on");
      btn.addEventListener('click',()=>{
        [...mseg.children].forEach(b=>b.classList.toggle("on",b===btn));
        CUR_MONTH=m;
        const ds2=getDatasets();
        if(ds2&&ds2.customer) $("#period").textContent=ds2.customer.period||"—";
        render();
      });
      mseg.append(btn);
    });
    monthRow.appendChild(mseg);
  }
  buildDateBar();
  const ds=getDatasets();
  if(ds&&ds.customer) $("#period").textContent=ds.customer.period||"—";
  $("#gen").textContent=DASH_DATA.generated||"—";
  render();
}
boot();
</script>
</body>
</html>
